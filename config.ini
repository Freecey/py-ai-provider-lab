[app]
# Directory for SQLite database and media files (default: user data dir)
data_dir = ./data

# Logging level: DEBUG, INFO, WARNING, ERROR
log_level = INFO

# UI theme: light or dark
theme = light

# Language: fr or en
lang = fr

# Default network timeout in seconds
network_timeout = 30

# Enable sandbox/mock mode (no real API calls)
sandbox_mode = false
